<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>SatMap — Live Satellite &amp; ISS Tracker</title>

<!-- PWA / installability -->
<link rel="manifest" href="manifest.webmanifest" />
<meta name="theme-color" content="#05070f" />
<meta name="description" content="Track the ISS and hundreds of satellites in real time on a 3D globe." />
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="SatMap" />
<style>
  :root{
    --bg:#05070f; --panel:rgba(12,18,34,.72); --panel-solid:#0b1122;
    --border:rgba(120,160,255,.18); --text:#e8eefc; --muted:#8aa0c8;
    --accent:#5ad1ff; --iss:#ff5a4d; --star:#7fe7ff; --gps:#ffd34d;
    --wx:#57e08a; --other:#b9c7e6; --overhead:#ffffff;
    --glow:0 0 24px rgba(90,209,255,.35);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--text);overflow:hidden;
    overscroll-behavior:none;-webkit-tap-highlight-color:transparent;
    -webkit-user-select:none;user-select:none;touch-action:manipulation}
  #globe{position:fixed;inset:0;touch-action:none}
  #backdrop{display:none}
  .sheet-handle{display:none}
  .mono{font-family:"SF Mono",ui-monospace,Menlo,Consolas,monospace;font-variant-numeric:tabular-nums}

  /* Top bar */
  #topbar{position:fixed;top:0;left:0;right:0;display:flex;align-items:center;gap:18px;
    padding:12px 18px;z-index:20;pointer-events:none;
    background:linear-gradient(180deg,rgba(3,6,15,.85),rgba(3,6,15,0));}
  #brand{display:flex;align-items:baseline;gap:10px;pointer-events:auto}
  #brand h1{margin:0;font-size:19px;font-weight:700;letter-spacing:.5px}
  #brand h1 span{color:var(--accent);text-shadow:var(--glow)}
  #brand .tag{font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase}
  #clocks{margin-left:auto;display:flex;gap:22px;pointer-events:auto}
  .clock b{display:block;font-size:10px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase}
  .clock span{font-size:16px}
  #stat{display:flex;gap:18px;pointer-events:auto}
  .stat b{display:block;font-size:10px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase}
  .stat span{font-size:16px;color:var(--accent)}

  /* Panels */
  .panel{position:fixed;z-index:20;background:var(--panel);backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);border:1px solid var(--border);border-radius:16px;
    box-shadow:0 12px 40px rgba(0,0,0,.5)}
  #overhead{top:74px;right:16px;width:300px;max-height:calc(100vh - 200px);
    display:flex;flex-direction:column;overflow:hidden}
  #overhead .head{padding:13px 16px 10px;border-bottom:1px solid var(--border)}
  #overhead .head h2{margin:0;font-size:13px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}
  #overhead .head .sub{font-size:12px;color:var(--muted);margin-top:3px}
  #overhead .head .sub b{color:var(--accent)}
  #ohlist{overflow-y:auto;padding:6px}
  .oh{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:10px;cursor:pointer}
  .oh:hover{background:rgba(120,160,255,.09)}
  .oh .dot{width:9px;height:9px;border-radius:50%;flex:0 0 auto;box-shadow:0 0 8px currentColor}
  .oh .nm{flex:1;min-width:0;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .oh .el{font-size:12px;color:var(--muted)}
  .oh .el b{color:var(--text)}
  .empty{padding:22px 16px;color:var(--muted);font-size:13px;text-align:center;line-height:1.5}

  /* Controls bottom-left */
  #controls{left:16px;bottom:16px;width:260px;padding:14px 16px}
  #controls h2{margin:0 0 10px;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}
  #search{width:100%;padding:9px 12px;margin-bottom:12px;border-radius:10px;border:1px solid var(--border);
    background:rgba(0,0,0,.35);color:var(--text);font-size:13px;outline:none}
  #search:focus{border-color:var(--accent);box-shadow:var(--glow)}
  .legend{display:flex;flex-direction:column;gap:2px}
  .lg{display:flex;align-items:center;gap:10px;padding:6px 8px;border-radius:9px;cursor:pointer;user-select:none}
  .lg:hover{background:rgba(120,160,255,.08)}
  .lg.off{opacity:.4}
  .lg .dot{width:11px;height:11px;border-radius:50%;box-shadow:0 0 8px currentColor}
  .lg .nm{flex:1;font-size:13px}
  .lg .ct{font-size:12px;color:var(--muted)}
  #locbtn{margin-top:12px;width:100%;padding:9px;border-radius:10px;border:1px solid var(--border);
    background:rgba(90,209,255,.12);color:var(--accent);font-size:12px;font-weight:600;letter-spacing:.5px;
    cursor:pointer;transition:.15s}
  #locbtn:hover{background:rgba(90,209,255,.22)}

  /* Selection detail */
  #detail{left:16px;top:74px;width:260px;padding:14px 16px;display:none}
  #detail .x{position:absolute;top:10px;right:12px;color:var(--muted);cursor:pointer;font-size:16px}
  #detail h3{margin:0 6px 10px 0;font-size:15px;padding-right:16px}
  #detail .row{display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px solid rgba(120,160,255,.08)}
  #detail .row b{color:var(--muted);font-weight:500}
  #detail .row span{color:var(--text)}

  /* Loader */
  #loader{position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:18px;background:radial-gradient(circle at 50% 40%,#0a1226,#05070f)}
  #loader .ring{width:54px;height:54px;border-radius:50%;border:3px solid rgba(90,209,255,.2);
    border-top-color:var(--accent);animation:spin 1s linear infinite}
  #loader p{color:var(--muted);font-size:14px;letter-spacing:.5px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .fade{opacity:0;pointer-events:none;transition:opacity .6s}

  /* Satellite markers (globe.gl html layer) */
  .sat{width:7px;height:7px;border-radius:50%;background:currentColor;cursor:pointer;
    pointer-events:auto;box-shadow:0 0 5px currentColor;transition:width .15s,height .15s}
  .sat:hover{width:12px;height:12px}
  .sat.iss{width:14px;height:14px;box-shadow:0 0 9px currentColor,0 0 16px currentColor}
  .sat.up{background:#fff!important;color:#fff!important;
    box-shadow:0 0 9px #fff,0 0 20px var(--star);width:11px;height:11px}
  .sat.iss.up{width:16px;height:16px}

  /* Floating "center on me" button */
  #gotome{position:fixed;right:16px;bottom:16px;z-index:25;width:52px;height:52px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:22px;
    background:var(--panel);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    border:1px solid var(--border);color:var(--accent);box-shadow:0 8px 24px rgba(0,0,0,.5);transition:.15s}
  #gotome:hover{background:rgba(90,209,255,.18);box-shadow:var(--glow)}
  #gotome:active{transform:scale(.92)}
  #gotome.busy{color:#fff;animation:locpulse 1s ease-in-out infinite}
  @keyframes locpulse{0%,100%{box-shadow:0 8px 24px rgba(0,0,0,.5)}50%{box-shadow:0 0 20px var(--accent),0 0 8px var(--accent)}}

  /* Account (top-right) */
  #account{pointer-events:auto;flex:0 0 auto;width:38px;height:38px;border-radius:50%;
    border:1px solid var(--border);background:var(--panel);color:var(--text);cursor:pointer;
    display:flex;align-items:center;justify-content:center;overflow:hidden;padding:0}
  #account:hover{border-color:var(--accent);color:var(--accent)}
  #account img{width:100%;height:100%;object-fit:cover;display:block}
  #accountmenu{position:fixed;top:60px;right:16px;width:260px;padding:16px;z-index:80;display:none}
  #accountmenu.open{display:block}
  #accountmenu .who{display:flex;gap:11px;align-items:center;margin-bottom:14px}
  #accountmenu .who img{width:42px;height:42px;border-radius:50%;flex:0 0 auto}
  #accountmenu .who .nm{font-size:14px;font-weight:600;line-height:1.2}
  #accountmenu .who .em{font-size:12px;color:var(--muted);word-break:break-all}
  #accountmenu .act{width:100%;padding:11px;border-radius:11px;border:1px solid var(--border);
    background:rgba(90,209,255,.12);color:var(--accent);font-size:13px;font-weight:600;cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:9px}
  #accountmenu .act:hover{background:rgba(90,209,255,.22)}
  #accountmenu .act.g{background:#fff;color:#3c4043;border-color:#dadce0}
  #accountmenu .act.g:hover{background:#f5f5f5}
  #accountmenu .note{font-size:11.5px;color:var(--muted);line-height:1.45}
  #accountmenu .note.top{margin:0 0 12px}
  #accountmenu .note.bot{margin:12px 0 0}
  @media (max-width:820px){
    #accountmenu{top:calc(env(safe-area-inset-top) + 52px);right:10px;width:min(280px,86vw)}
    #account{width:34px;height:34px}
  }

  #err{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:70;
    background:rgba(120,30,30,.9);border:1px solid #ff6b6b;color:#ffdede;padding:9px 16px;
    border-radius:10px;font-size:13px;display:none;max-width:90vw}

  /* Success/info toast */
  #toast{position:fixed;bottom:16px;left:50%;transform:translate(-50%,20px);z-index:75;
    background:var(--panel);border:1px solid var(--border);color:var(--text);
    padding:11px 18px;border-radius:12px;font-size:13px;font-weight:500;max-width:90vw;
    box-shadow:0 10px 30px rgba(0,0,0,.5);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;white-space:nowrap;
    overflow:hidden;text-overflow:ellipsis}
  #toast.show{opacity:1;transform:translate(-50%,0)}
  #toast.ok{border-color:rgba(87,224,138,.55)}

  /* Install button (shown when installable) */
  #installbtn{display:none;margin-top:10px;width:100%;padding:10px;border-radius:10px;
    border:1px solid var(--accent);background:rgba(90,209,255,.14);color:var(--accent);
    font-size:12px;font-weight:600;cursor:pointer}
  #installbtn:hover{background:rgba(90,209,255,.24)}

  /* Mobile bottom toolbar (hidden on desktop) */
  #mbar{display:none}

  /* ============ MOBILE LAYOUT ============ */
  @media (max-width:820px){
    #topbar{padding:calc(env(safe-area-inset-top) + 8px) 12px 8px;gap:10px;
      background:linear-gradient(180deg,rgba(3,6,15,.92),rgba(3,6,15,0))}
    #brand h1{font-size:16px} #brand .tag{display:none}
    #stat{gap:12px} .stat span{font-size:14px} .stat b{font-size:9px}
    #clocks{gap:12px} .clock span{font-size:13px} .clock b{font-size:9px}

    /* Backdrop behind open sheets */
    #backdrop{display:block;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:55;
      opacity:0;pointer-events:none;transition:opacity .3s}
    #backdrop.show{opacity:1;pointer-events:auto}

    /* Panels become bottom sheets */
    #controls,#overhead,#detail{
      left:0;right:0;bottom:0;top:auto;width:auto!important;max-width:none;
      display:block;border-radius:22px 22px 0 0;border-bottom:none;
      transform:translateY(115%);transition:transform .34s cubic-bezier(.32,.72,0,1);
      max-height:min(72vh,600px);z-index:60;
      padding:0 16px calc(env(safe-area-inset-bottom) + 16px);overflow-y:auto}
    #controls.open,#overhead.open,#detail.open{transform:translateY(0)}
    #overhead{padding:0 16px calc(env(safe-area-inset-bottom) + 16px);display:block}
    #overhead .head{padding-top:0}
    #overhead #ohlist{overflow:visible;padding:6px 0}
    #detail .x{display:none}          /* swipe down to close instead */
    .sheet-handle{cursor:grab}
    .sheet-handle{display:block;width:42px;height:5px;border-radius:3px;
      background:var(--muted);opacity:.45;margin:10px auto 8px;flex:0 0 auto}
    #overhead .sheet-handle{margin-bottom:2px}

    /* Bigger touch targets */
    #controls h2{margin-top:2px}
    .lg{padding:12px 8px} .lg .nm{font-size:15px}
    .oh{padding:13px 10px} .oh .nm{font-size:15px}
    #locbtn{padding:14px;font-size:13px} #installbtn{padding:14px;font-size:13px}
    #search{padding:12px 14px;font-size:16px}
    #detail .row{padding:8px 0;font-size:13px}

    /* Recenter FAB sits above the toolbar */
    #gotome{bottom:calc(env(safe-area-inset-bottom) + 72px);right:12px;width:50px;height:50px}
    #err{bottom:calc(env(safe-area-inset-bottom) + 78px)}
    #toast{bottom:calc(env(safe-area-inset-bottom) + 78px)}

    /* Bottom toolbar */
    #mbar{display:flex;position:fixed;left:0;right:0;bottom:0;z-index:50;gap:8px;
      padding:8px 10px calc(env(safe-area-inset-bottom) + 8px);
      background:linear-gradient(0deg,rgba(3,6,15,.95),rgba(3,6,15,.4) 70%,rgba(3,6,15,0))}
    #mbar button{flex:1;height:50px;border-radius:15px;border:1px solid var(--border);
      background:var(--panel);color:var(--text);font-size:11px;font-weight:600;letter-spacing:.3px;
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
      backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);cursor:pointer}
    #mbar button .ic{font-size:18px;line-height:1}
    #mbar button.active{color:var(--accent);border-color:rgba(90,209,255,.6);
      background:rgba(90,209,255,.12)}
  }
</style>
</head>

<div id="globe"></div>

<div id="topbar">
  <div id="brand">
    <h1>Sat<span>Map</span></h1>

  </div>

  <div class="sheet-handle"></div>

  <h3 id="d-name">—</h3>
  <div class="row"><b>Group</b><span id="d-group">—</span></div>

  <div class="row"><b>Longitude</b><span id="d-lng">—</span></div>

<button id="gotome" title="Center on my location">⌖</button>

<!-- Mobile bottom toolbar -->
<nav id="mbar">
  <button id="mb-layers"><span class="ic">🛰️</span>Layers</button>
  <button id="mb-over"><span class="ic">📡</span>Overhead</button>

<div id="backdrop"></div>

  <div class="ring"></div>
  <p id="loadmsg">Fetching live orbital elements…</p>
</div>

<div id="toast"></div>

<script>
const EARTH_R = 6371;          // km
const IS_MOBILE = window.matchMedia('(max-width:820px)').matches || window.matchMedia('(pointer:coarse)').matches;
const UPDATE_MS = IS_MOBILE ? 600 : 200;         // gentler propagation cadence on phones
const IMG = 'https://cdn.jsdelivr.net/npm/three-globe/example/img/';

// Satellite groups: Celestrak group id, label, color, optional cap.
// On mobile we track fewer objects (lighter on DOM/battery).
const GROUPS = [
  { id:'stations', label:'Stations (ISS)', color:'#ff5a4d', cap:40 },
  { id:'visual',   label:'Brightest',      color:'#b9c7e6', cap:170 },
  { id:'starlink', label:'Starlink',       color:'#5ad1ff', cap:150 },
  { id:'gps-ops',  label:'GPS',            color:'#ffd34d', cap:40 },
  { id:'galileo',  label:'Galileo',        color:'#c58cff', cap:40 },
  { id:'weather',  label:'Weather',        color:'#57e08a', cap:60 },
];
if(IS_MOBILE) GROUPS.forEach(g=>{ g.cap = Math.max(12, Math.round(g.cap*0.45)); });
const enabled = {}; GROUPS.forEach(g=>enabled[g.id]=true);

// Fallback ISS TLE so the app always shows *something* if everything else fails.
const FALLBACK = [{
  name:'ISS (ZARYA)', group:'stations', id:'25544',
  l1:'1 25544U 98067A   26199.50000000  .00016717  00000-0  30777-3 0  9991',
  l2:'2 25544  51.6416 247.4627 0006703 130.5360 325.0288 15.49309239 20000'
}];

let SATS = [];            // {name,id,group,color,satrec, lat,lng,alt,altKm,speed,elevation,azimuth,rangeKm, el}
let observer = null;      // {lat,lng, gd:{longitude,latitude,height}}
let selected = null;
const $ = id => document.getElementById(id);
const showErr = m => { const e=$('err'); e.textContent=m; e.style.display='block'; setTimeout(()=>e.style.display='none',7000); };
function showToast(msg, ok){
  const t=$('toast'); if(!t) return;
  t.textContent=msg; t.className='show'+(ok?' ok':'');
  clearTimeout(t._tm); t._tm=setTimeout(()=>t.classList.remove('show'), 3600);
}

/* ---------- TLE fetching ----------
   Primary: CelesTrak. Backup: tle.ivanstanojevic.me (community TLE API).
   Every successful CelesTrak fetch is cached in localStorage, so a feed
   outage falls back to the backup API, then to your last good elements,
   and only then to the hardcoded ISS. */
const TLE_CACHE_KEY = 'satmap-tle-cache-v1';
const BACKUP_MAX_AGE_DAYS = 14;   // skip backup elements older than this (likely decayed/stale)
// Map our CelesTrak groups to name searches on the backup API.
// 'visual' has no equivalent there — it relies on the localStorage cache.
const BACKUP_SEARCH = { starlink:'starlink', 'gps-ops':'navstar', galileo:'galileo', weather:'noaa' };

function readTleCache(){ try{ return JSON.parse(localStorage.getItem(TLE_CACHE_KEY)) || {}; }catch(e){ return {}; } }
function writeTleCache(c){ try{ localStorage.setItem(TLE_CACHE_KEY, JSON.stringify(c)); }catch(e){} }

async function fetchGroup(g){
  const url = `https://celestrak.org/NORAD/elements/gp.php?GROUP=${g.id}&FORMAT=tle`;
  const ctrl = new AbortController();
  const timer = setTimeout(()=>ctrl.abort(), 12000);   // don't hang forever on a slow feed
  try{
    const res = await fetch(url, { cache:'no-store', signal:ctrl.signal });
    if(!res.ok) throw new Error('HTTP '+res.status);
    const text = await res.text();
    if(text.includes('<') || text.trim().length < 20) throw new Error('bad payload');
    const lines = text.split(/\r?\n/).filter(l=>l.trim().length);
    const out = [];
    for(let i=0;i+2<lines.length;i+=3){
      const name=lines[i].trim(), l1=lines[i+1], l2=lines[i+2];
      if(!l1.startsWith('1 ')||!l2.startsWith('2 ')) continue;
      out.push({ name, l1, l2, id:l1.slice(2,7).trim(), group:g.id });
      if(g.cap && out.length>=g.cap) break;
    }
    if(!out.length) throw new Error('no elements in payload');
    return out;
  } finally { clearTimeout(timer); }
}

async function fetchGroupBackup(g){
  const base = 'https://tle.ivanstanojevic.me/api/tle';
  let url;
  if(g.id==='stations') url = base + '/25544';                       // ISS by NORAD id
  else if(BACKUP_SEARCH[g.id]) url = base + '?search=' + BACKUP_SEARCH[g.id] +
    '&page-size=' + Math.min(g.cap||100, 100);
  else return [];                                                    // no mapping (e.g. 'visual')
  const ctrl = new AbortController();
  const timer = setTimeout(()=>ctrl.abort(), 12000);
  try{
    const res = await fetch(url, { cache:'no-store', signal:ctrl.signal });
    if(!res.ok) throw new Error('HTTP '+res.status);
    const j = await res.json();
    const members = j.member ? j.member : [j];
    const cutoff = Date.now() - BACKUP_MAX_AGE_DAYS*86400000;
    const out = [];
    for(const m of members){
      if(!m || !m.line1 || !m.line2) continue;
      if(m.date && Date.parse(m.date) < cutoff) continue;            // stale — probably decayed
      out.push({ name:m.name, l1:m.line1, l2:m.line2, id:String(m.satelliteId), group:g.id });
      if(g.cap && out.length>=g.cap) break;
    }
    return out;
  } finally { clearTimeout(timer); }
}

async function loadData(){
  const cache = readTleCache();
  const live = await Promise.allSettled(GROUPS.map(fetchGroup));
  let raw = [];
  const failed = [];
  GROUPS.forEach((g,i)=>{
    const r = live[i];
    if(r.status==='fulfilled' && r.value.length){
      raw = raw.concat(r.value);
      cache[g.id] = { ts: Date.now(), sats: r.value };
    } else {
      console.warn('live TLE fetch failed for', g.id, r.status==='rejected'?r.reason:'(empty)');
      failed.push(g);
    }
  });
  let backupN = 0, cachedN = 0, oldestTs = null;
  if(failed.length){
    const backups = await Promise.allSettled(failed.map(fetchGroupBackup));
    failed.forEach((g,i)=>{
      const b = backups[i];
      if(b.status==='fulfilled' && b.value.length){
        raw = raw.concat(b.value); backupN++;
      } else if(cache[g.id] && cache[g.id].sats && cache[g.id].sats.length){
        raw = raw.concat(cache[g.id].sats); cachedN++;
        if(oldestTs===null || cache[g.id].ts<oldestTs) oldestTs = cache[g.id].ts;
      }
    });
  }
  writeTleCache(cache);
  if(failed.length && raw.length){
    const age = oldestTs ? Math.max(1, Math.round((Date.now()-oldestTs)/3600000)) : null;
    const src = [];
    if(backupN) src.push('a backup feed');
    if(cachedN) src.push('saved elements' + (age ? ' (~'+age+'h old)' : ''));
    showToast('Live TLE feed is down — using ' + (src.join(' and ') || 'partial data') + '.');
  }
  if(!raw.length){
    showErr('Could not reach any TLE source — showing the ISS from built-in elements.');
    raw = FALLBACK.map(f=>({name:f.name,l1:f.l1,l2:f.l2,id:f.id,group:f.group}));
  }
  SATS = buildSatrecs(raw);
}

function buildSatrecs(raw){
  const seen = new Set(), list = [];
  for(const r of raw){
    if(seen.has(r.id)) continue;
    let rec; try{ rec = satellite.twoline2satrec(r.l1, r.l2); }catch(e){ continue; }
    if(!rec || rec.error) continue;
    const g = GROUPS.find(x=>x.id===r.group);
    seen.add(r.id);
    list.push({ name:r.name, id:r.id, group:r.group, color:(g?g.color:'#b9c7e6'), satrec:rec,
      lat:0,lng:0,alt:0,altKm:0,speed:0,elevation:null,azimuth:null,rangeKm:null,el:null });
  }
  return list;
}

/* ---------- Globe ---------- */
let world;
function initGlobe(){
  world = Globe()(document.getElementById('globe'))
    .globeImageUrl(IMG+'earth-blue-marble.jpg')
    .bumpImageUrl(IMG+'earth-topology.png')
    .backgroundImageUrl(IMG+'night-sky.png')
    .showAtmosphere(true).atmosphereColor('#5ad1ff').atmosphereAltitude(0.16)
    .htmlLat('lat').htmlLng('lng').htmlAltitude('alt')
    .htmlElement(d=>{
      const el = document.createElement('div');
      el.className = 'sat' + (d.id==='25544' ? ' iss' : '');
      el.style.color = d.color;
      el.title = d.name;
      el.onclick = (ev)=>{ ev.stopPropagation(); selectSat(d); };
      d.el = el;
      return el;
    })
    .ringColor(()=> t=>`rgba(90,209,255,${1-t})`)
    .ringMaxRadius(4).ringPropagationSpeed(2).ringRepeatPeriod(900)
    .pathColor(()=> ['rgba(255,90,77,.85)','rgba(255,90,77,0)'])
    .pathStroke(2).pathPointAlt('alt').pathTransitionDuration(0);

  const controls = world.controls();
  controls.autoRotate = true; controls.autoRotateSpeed = 0.28;
  controls.enableDamping = true; controls.dampingFactor = 0.1;
  // Touch gestures: one finger rotates; two fingers rotate (and pinch to zoom).
  // three.js TOUCH enum: ROTATE=0, PAN=1, DOLLY_PAN=2, DOLLY_ROTATE=3
  if(controls.touches){ controls.touches.ONE = 0; controls.touches.TWO = 3; }
  // Persist zoom level: saveSettings() debounces, so this commits only after the camera settles.
  controls.addEventListener('change', ()=>{ if(!controls.autoRotate) saveSettings(); });
  // stop auto-rotate once the user interacts
  ['pointerdown','wheel','touchstart'].forEach(ev=>
    world.renderer().domElement.addEventListener(ev,()=>{controls.autoRotate=false},{once:true}));

  window.addEventListener('resize',()=>{ world.width(innerWidth).height(innerHeight); });
  world.width(innerWidth).height(innerHeight);
}

/* ---------- Propagation loop ---------- */
function propagate(){
  const now = new Date();
  const gmst = satellite.gstime(now);
  let overhead = 0;
  const active = SATS.filter(s=>enabled[s.group]);
  for(const s of active){
    let pv; try{ pv = satellite.propagate(s.satrec, now); }catch(e){ continue; }
    if(!pv || !pv.position){ s.lat=s.lng=null; continue; }
    const gd = satellite.eciToGeodetic(pv.position, gmst);
    s.lat = satellite.degreesLat(gd.latitude);
    s.lng = satellite.degreesLong(gd.longitude);
    s.altKm = gd.height;
    s.alt = gd.height / EARTH_R;
    if(pv.velocity){ const v=pv.velocity; s.speed = Math.sqrt(v.x*v.x+v.y*v.y+v.z*v.z); }
    if(observer){
      const ecf = satellite.eciToEcf(pv.position, gmst);
      const la = satellite.ecfToLookAngles(observer.gd, ecf);
      s.elevation = la.elevation*180/Math.PI;
      s.azimuth = la.azimuth*180/Math.PI;
      s.rangeKm = la.rangeSat;
      const up = s.elevation > 0;
      if(up) overhead++;
      if(s.el) s.el.classList.toggle('up', up);
    } else if(s.el){ s.el.classList.remove('up'); }
  }
  world.htmlElementsData(active.filter(s=>s.lat!=null && s.lng!=null));
  $('s-total').textContent = active.length;
  $('s-over').textContent = observer ? overhead : '—';
  if(selected) renderDetail(selected);
  renderOverhead(active, overhead);
}

/* ---------- ISS orbit path ---------- */
function updateIssOrbit(){
  const iss = SATS.find(s=>s.id==='25544');
  if(!iss || !enabled['stations']){ world.pathsData([]); return; }
  const pts=[]; const t0=Date.now();
  for(let m=0;m<=95;m+=1){                 // ~one orbit, 1-min steps
    const t=new Date(t0+m*60000);
    let pv; try{ pv=satellite.propagate(iss.satrec,t);}catch(e){continue;}
    if(!pv||!pv.position) continue;
    const gd=satellite.eciToGeodetic(pv.position,satellite.gstime(t));
    pts.push({lat:satellite.degreesLat(gd.latitude),lng:satellite.degreesLong(gd.longitude),alt:gd.height/EARTH_R});
  }
  world.pathsData([pts]);
}

/* ---------- Location ---------- */
const ME_ZOOM = 1.15;   // how tightly the camera centres on your location

// globe.gl's built-in animated pointOfView transition does not progress in this
// build, so we animate the camera ourselves frame-by-frame (instant moves work).
let flyRAF = null;
function flyTo(lat, lng, altitude, ms){
  ms = ms || 900;
  world.controls().autoRotate = false;
  const start = world.pointOfView();
  let dLng = lng - start.lng;                    // take the shortest way round
  if(dLng > 180) dLng -= 360; else if(dLng < -180) dLng += 360;
  const t0 = performance.now();
  if(flyRAF) cancelAnimationFrame(flyRAF);
  function step(now){
    const k = Math.min(1, (now - t0) / ms);
    const e = k < .5 ? 2*k*k : 1 - Math.pow(-2*k + 2, 2)/2;   // easeInOutQuad
    world.pointOfView({
      lat: start.lat + (lat - start.lat) * e,
      lng: start.lng + dLng * e,
      altitude: start.altitude + (altitude - start.altitude) * e
    }, 0);
    if(k < 1) flyRAF = requestAnimationFrame(step); else flyRAF = null;
  }
  flyRAF = requestAnimationFrame(step);
}

function setObserver(lat,lng,recenter){
  observer = { lat, lng, gd:{ longitude:satellite.degreesToRadians(lng),
    latitude:satellite.degreesToRadians(lat), height:0.05 } };
  world.ringsData([{lat,lng}]).ringAltitude(0.006);
  $('oh-sub').innerHTML = `Your location · <b>${lat.toFixed(3)}°, ${lng.toFixed(3)}°</b>`;
  world.controls().autoRotate=false;
  if(recenter!==false){ flyTo(lat, lng, ME_ZOOM, 900); if(isMobile()) openSheet('overhead'); }
  saveSettings();
}
// Bottom-right location button: get your location if needed, then centre on it.
function flyToMe(){
  if(observer){
    flyTo(observer.lat, observer.lng, ME_ZOOM, 900);
  } else {
    requestLocation();      // fetches an exact fix, then centres via setObserver
  }
}
function requestLocation(){
  if(!navigator.geolocation){ showErr('Geolocation is not available in this browser.'); return; }
  $('locbtn').textContent='Locating…';
  $('gotome').classList.add('busy');
  navigator.geolocation.getCurrentPosition(
    p=>{ setObserver(p.coords.latitude, p.coords.longitude, true);
         $('locbtn').textContent='📍 Location set'; $('gotome').classList.remove('busy'); },
    e=>{ showErr('Location permission denied — showing the global view.');
         $('locbtn').textContent='📍 Use my location'; $('gotome').classList.remove('busy'); },
    {enableHighAccuracy:true, timeout:15000, maximumAge:0});   // exact, fresh fix
}

/* ---------- UI rendering ---------- */
function renderOverhead(active, count){
  const el=$('ohlist');
  if(!observer){ el.innerHTML='<div class="empty">Tap “Use my location” to list every satellite currently above your horizon.</div>'; return; }
  const up = active.filter(s=>s.elevation>0).sort((a,b)=>b.elevation-a.elevation);
  if(!up.length){ el.innerHTML='<div class="empty">No tracked satellites above your horizon right now. They move fast — check back in a minute.</div>'; return; }
  el.innerHTML = up.slice(0,40).map(s=>`
    <div class="oh" data-id="${s.id}">
      <div class="dot" style="color:${s.color}"></div>
      <div class="nm">${s.name}</div>
      <div class="el mono"><b>${s.elevation.toFixed(0)}°</b></div>
    </div>`).join('');
  el.querySelectorAll('.oh').forEach(n=>n.onclick=()=>{
    const s=SATS.find(x=>x.id===n.dataset.id); if(s) selectSat(s); });
}

function renderLegend(){
  const el=$('legend');
  el.innerHTML = GROUPS.map(g=>`
    <div class="lg" data-id="${g.id}">
      <div class="dot" style="color:${g.color}"></div>
      <div class="nm">${g.label}</div>
      <div class="ct mono" id="ct-${g.id}">0</div>
    </div>`).join('');
  el.querySelectorAll('.lg').forEach(n=>n.onclick=()=>{
    const id=n.dataset.id; enabled[id]=!enabled[id];
    n.classList.toggle('off',!enabled[id]);
    if(id==='stations') updateIssOrbit();
    saveSettings();
  });
}
function updateLegendCounts(){
  GROUPS.forEach(g=>{ const c=SATS.filter(s=>s.group===g.id).length; const el=$('ct-'+g.id); if(el) el.textContent=c; });
}

function selectSat(s){
  selected=s;
  flyTo(s.lat, s.lng, 1.8, 900);

  else $('detail').style.display='block';

function renderDetail(s){
  const g=GROUPS.find(x=>x.id===s.group);

function doSearch(q){
  q=q.trim().toLowerCase(); if(!q) return;
  const s=SATS.find(x=>enabled[x.group] && x.name.toLowerCase().includes(q));
  if(s) selectSat(s); else showErr('No tracked satellite matches “'+q+'”.');
}

function tickClock(){

/* ---------- Boot ---------- */
async function boot(){
  if(typeof Globe==='undefined' || typeof satellite==='undefined'){
    $('loadmsg').textContent='Failed to initialise 3D libraries. Check your connection and reopen.'; return;
  }
  initGlobe();
  renderLegend();
  $('loadmsg').textContent='Fetching live orbital elements…';
  await loadData();
  updateLegendCounts();
  updateIssOrbit();
  propagate();
  $('loader').classList.add('fade');
  setTimeout(()=>$('loader').remove(),700);

  setInterval(propagate, UPDATE_MS);
  setInterval(tickClock, 1000); tickClock();
  setInterval(updateIssOrbit, 30000);  // refresh ISS track periodically

  $('locbtn').onclick=requestLocation;
  $('gotome').onclick=flyToMe;
  $('search').addEventListener('keydown',e=>{ if(e.key==='Enter') doSearch(e.target.value); });
}

const mq = window.matchMedia('(max-width:820px)');

function syncBar(){
  const c=$('controls').classList.contains('open'), o=$('overhead').classList.contains('open');

  $(id).classList.add('open'); $('backdrop').classList.add('show'); syncBar();
}
function toggleSheet(id){ $(id).classList.contains('open') ? closeSheets() : openSheet(id); }
// Swipe a bottom sheet downward to dismiss it (only when scrolled to the top).
function enableSwipeClose(el){
  let sy=0, cy=0, drag=false;
  el.addEventListener('touchstart', e=>{
    if(e.touches.length!==1){ drag=false; return; }
    sy=cy=e.touches[0].clientY;
    drag = el.scrollTop<=0;          // don't hijack a mid-list scroll
    el.style.transition='none';
  }, {passive:true});
  el.addEventListener('touchmove', e=>{
    if(!drag) return;
    cy=e.touches[0].clientY;
    const dy=cy-sy;
    if(dy>0){ el.style.transform='translateY('+dy+'px)'; }
    else { drag=false; el.style.transform=''; }
  }, {passive:true});
  const end=()=>{
    if(!drag) return; drag=false;
    const dy=cy-sy;
    el.style.transition='';          // hand back to the CSS transition
    el.style.transform='';
    if(dy>90) closeSheets();          // past threshold → dismiss
  };
  el.addEventListener('touchend', end, {passive:true});
  el.addEventListener('touchcancel', end, {passive:true});
}

function initMobileUI(){
  $('backdrop').addEventListener('click', closeSheets);
  $('mb-layers').addEventListener('click', ()=>toggleSheet('controls'));
  $('mb-over').addEventListener('click', ()=>toggleSheet('overhead'));
  $('mb-loc').addEventListener('click', requestLocation);
  SHEETS.forEach(id=>enableSwipeClose($(id)));   // swipe-down to close
}

let currentUser=null, unsubSettings=null, applyingRemote=false, saveTimer=null, firstSyncPending=false, wasSignedIn=false;
const GOOGLE_G = '<svg width="16" height="16" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.6l6.7-6.7C35.6 2.4 30.1 0 24 0 14.6 0 6.4 5.4 2.5 13.3l7.8 6.1C12.2 13.3 17.6 9.5 24 9.5z"/><path fill="#4285F4" d="M46.1 24.5c0-1.6-.1-3.1-.4-4.5H24v9h12.4c-.5 2.9-2.1 5.3-4.6 7l7.1 5.5c4.2-3.9 6.6-9.6 6.6-16.9z"/><path fill="#FBBC05" d="M10.3 19.4l-7.8-6.1C.9 16.4 0 20.1 0 24s.9 7.6 2.5 10.7l7.8-6.1c-.5-1.5-.8-3-.8-4.6s.3-3.1.8-4.6z"/><path fill="#34A853" d="M24 48c6.1 0 11.3-2 15-5.5l-7.1-5.5c-2 1.3-4.6 2.1-7.9 2.1-6.4 0-11.8-3.8-13.7-9.4l-7.8 6.1C6.4 42.6 14.6 48 24 48z"/></svg>';
const USER_ICON = '<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4.4 3.6-7 8-7s8 2.6 8 7"/></svg>';

function collectSettings(){
  const groups={}; GROUPS.forEach(g=>groups[g.id]=!!enabled[g.id]);
  let zoom=null; try{ zoom=world.pointOfView().altitude; }catch(e){}
  return { groups, lat: observer?observer.lat:null, lng: observer?observer.lng:null, zoom, updatedAt: Date.now() };
}
function saveSettings(){
  if(!currentUser || applyingRemote || !window.fb) return;
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{
    const {db, doc, setDoc}=window.fb;
    setDoc(doc(db,'users',currentUser.uid), collectSettings(), {merge:true}).catch(e=>console.warn('save failed',e));
  }, 700);
}
function applySettings(s){
  if(!s) return;
  applyingRemote=true;
  try{
    if(s.groups){
      GROUPS.forEach(g=>{ if(g.id in s.groups){ enabled[g.id]=!!s.groups[g.id];
        const n=document.querySelector('.lg[data-id="'+g.id+'"]'); if(n) n.classList.toggle('off',!enabled[g.id]); } });
      updateIssOrbit();
    }
    const z = (typeof s.zoom==='number' && s.zoom>0) ? s.zoom : ME_ZOOM;
    if(typeof s.lat==='number' && typeof s.lng==='number'){
      setObserver(s.lat, s.lng, false);
      if(firstSyncPending){ firstSyncPending=false; flyTo(s.lat, s.lng, z, 1000); }
    } else if(firstSyncPending && typeof s.zoom==='number' && s.zoom>0){
      firstSyncPending=false;
      const p=world.pointOfView(); flyTo(p.lat, p.lng, z, 800);   // restore zoom even without a saved location
    }
  } finally { applyingRemote=false; }
}

function updateAccountUI(user){
  const btn=$('account'), menu=$('accountmenu');

function signInGoogle(){
  if(!window.fb){ showErr('Sign-in is still loading — try again in a moment.'); return; }
  const {auth, GoogleAuthProvider, signInWithPopup, signInWithRedirect}=window.fb;
  const provider=new GoogleAuthProvider();
  if(IS_MOBILE){ signInWithRedirect(auth, provider); return; }
  signInWithPopup(auth, provider).catch(e=>{
    const c=(e&&e.code)||'';
    if(c.includes('popup')||c.includes('cancelled-popup')) signInWithRedirect(auth, provider);
    else showErr('Sign-in failed: '+((e&&e.message)||c));
  });
}
function signOutUser(){ if(window.fb) window.fb.signOut(window.fb.auth).catch(e=>console.warn(e)); }

// Called by the module once the Firebase SDK is initialised (window.fb is ready).
function initAuth(){
  const {auth, onAuthStateChanged, getRedirectResult}=window.fb;
  getRedirectResult(auth).catch(e=>console.warn('redirect result',e));
  onAuthStateChanged(auth, user=>{
    currentUser=user;
    updateAccountUI(user);
    if(unsubSettings){ unsubSettings(); unsubSettings=null; }
    if(user){
      firstSyncPending=true;
      showToast('✓ Signed in as ' + (user.displayName || user.email), true);
      wasSignedIn=true;
      const {db, doc, onSnapshot}=window.fb;
      unsubSettings = onSnapshot(doc(db,'users',user.uid),
        snap=>{ if(snap.exists()) applySettings(snap.data()); },
        err=>console.warn('settings snapshot error',err));
    } else {
      if(wasSignedIn) showToast('Signed out');
      wasSignedIn=false;
    }
  });
}

initMobileUI(); initInstall(); registerSW(); initAccountUI();
